<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFRBO Skill Sheets — Avon Fire and Rescue Service</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 10pt; color: #000; background: #fff; }

  .page {
    width: 210mm;
    min-height: 297mm;
    margin: 0 auto 20px;
    padding: 12mm 14mm;
    border: 1px solid #ccc;
    page-break-after: always;
  }

  @media print {
    body { margin: 0; }
    .page {
      margin: 0;
      border: none;
      page-break-after: always;
      width: 100%;
    }
    .no-print { display: none; }
  }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; border-bottom: 2px solid #000; padding-bottom: 6px; }
  .header-logo { font-size: 13pt; font-weight: bold; }
  .header-contact { font-size: 7.5pt; text-align: right; color: #333; }
  .course-ref { font-size: 7pt; color: #666; margin-top: 2px; }

  h1 { font-size: 13pt; font-weight: bold; text-align: center; margin: 6px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }

  .student-info { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 8px; font-size: 9.5pt; }
  .student-info div { border-bottom: 1px solid #000; padding: 2px 0; }
  .student-info span { font-weight: bold; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 9pt; margin-bottom: 6px; }
  th { background: #1a1a2e; color: #fff; padding: 4px 6px; text-align: left; font-size: 9pt; font-weight: bold; }
  td { padding: 3px 6px; border-bottom: 1px solid #ddd; vertical-align: middle; }
  tr:nth-child(even) td { background: #f5f5f5; }

  .section-header td { background: #e8e8e8; font-weight: bold; font-size: 9pt; padding: 4px 6px; border-top: 1px solid #999; }

  .two-col-table { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .two-col-table table { margin: 0; }
  .two-col-table table:first-child td, .two-col-table table:first-child th { border-right: 2px solid #000; }

  .date-cell { width: 80px; font-weight: bold; color: #1a1a2e; }
  .num-cell { width: 20px; color: #666; font-size: 8pt; }

  /* Assessment table */
  .assessment-table th:nth-child(2) { width: 90px; }
  .assessment-table th:nth-child(3), .assessment-table th:nth-child(4) { width: 50px; text-align: center; }
  .assessment-table td:nth-child(3), .assessment-table td:nth-child(4) { text-align: center; }
  .checkbox { display: inline-block; width: 14px; height: 14px; border: 1.5px solid #000; vertical-align: middle; }
  .checked { background: #1a1a2e; }

  .result-row { margin: 6px 0; font-size: 9.5pt; }
  .result-row strong { margin-right: 12px; }

  .note { font-size: 8pt; color: #444; margin: 5px 0; font-style: italic; }

  .remarks-box { border: 1px solid #000; min-height: 30px; padding: 4px; margin: 4px 0 8px; }

  .legal-text { font-size: 7.5pt; color: #333; margin: 6px 0; line-height: 1.4; }

  .sig-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .sig-block { font-size: 8.5pt; }
  .sig-block div { border-bottom: 1px solid #000; padding: 2px 0; margin-bottom: 3px; min-height: 20px; }
  .sig-label { font-weight: bold; font-size: 8pt; color: #555; }

  /* Print button */
  .no-print { text-align: center; padding: 12px; background: #f0f0f0; margin-bottom: 16px; }
  .no-print button { padding: 8px 24px; font-size: 11pt; background: #1a1a2e; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  .no-print button:hover { background: #2a2a4e; }
</style>
</head>
<body>

<div class="no-print">
  <button onclick="window.print()">🖨️ Print All 4 Sheets</button>
</div>

<script>
const STUDENTS = [
  { name: "Joshua Arberry", ref: "101-00044600266231-20260313" },
  { name: "Ben Crawford",   ref: "101-00044600266232-20260313" },
  { name: "Ben Newman",     ref: "101-00044600266234-20260313" },
  { name: "Paul Johnson",   ref: "101-00044600266237-20260313" },
];

const THEORY = [
  [1, "Rescue 3 philosophy"],
  [2, "Water rescue training standards"],
  [3, "Personal equipment"],
  [4, "Dynamic risk assessment and incident size-up"],
  [5, "Pre-planning"],
  [6, "Medical and decontamination considerations"],
  [7, "Navigation and route planning"],
  [8, "Communications"],
  [9, "Crew operational roles"],
  [10, "Multiple boat operations"],
  [11, "Floodwater dynamics and hazards"],
  [12, "Boat, hull and drive types"],
  [13, "Rescue boat equipment"],
  [14, "Pre- and post-trip checks"],
  [15, "Vehicles in water"],
  [16, "Working with helicopters"],
  [17, "Boat wraps"],
  [18, "Hydraulic and weir considerations"],
];

const PRACTICAL = [
  [19, "Launching and recovery"],
  [20, "Boat handling under power"],
  [21, "Boat handling with paddles"],
  [22, "Towing"],
  [23, "Anchoring/securing"],
  [24, "Wading with boats"],
  [25, "Tethered boats"],
  [26, "Night/poor visibility operations"],
  [27, "Search operations"],
  [28, "Flips and rights"],
  [29, "Team/personal recovery"],
  [30, "Casualty pick-up and recovery"],
  [31, "Casualty management"],
  [32, "Boat-based conditional rescues"],
  [33, "Transporting loads"],
  [34, "Boat-based stretcher management"],
  [35, "Rescues from elevated positions"],
  [36, "Boat-based tethered rescues"],
];

const ASSESSMENTS = [
  "Foundation knowledge",
  "Boat handling under power",
  "Boat handling with paddles",
  "Team/personal recovery",
  "Casualty pick-up and recovery",
  "Flips and rights",
];

// Date assignments
function getDate(itemNum) {
  if (itemNum >= 1 && itemNum <= 18) return "09/03/2026";
  if (itemNum >= 19 && itemNum <= 27) return "10/03/2026";
  return "11/03/2026";
}

function buildPage(student) {
  const theoryLeft = THEORY.slice(0, 9);
  const theoryRight = THEORY.slice(9, 18);
  const practLeft = PRACTICAL.slice(0, 9);
  const practRight = PRACTICAL.slice(9, 18);

  function rows(items) {
    return items.map(([num, label]) => `
      <tr>
        <td class="num-cell">${num}.</td>
        <td>${label}</td>
        <td class="date-cell">${getDate(num)}</td>
      </tr>`).join('');
  }

  function assessRows() {
    return ASSESSMENTS.map(a => `
      <tr>
        <td>${a}</td>
        <td class="date-cell">11/03/2026</td>
        <td style="text-align:center"><span class="checkbox checked"></span></td>
        <td style="text-align:center"><span class="checkbox"></span></td>
      </tr>`).join('');
  }

  return `
<div class="page">
  <div class="header">
    <div>
      <div class="header-logo">Rescue 3 Europe</div>
      <div class="course-ref">SFRBO v23.1 — ${student.ref}</div>
    </div>
    <div class="header-contact">
      www.rescue3europe.com<br>
      +44 (0) 1978 869069<br>
      info@rescue3europe.com
    </div>
  </div>

  <h1>Swiftwater and Flood Rescue Boat Operator</h1>

  <div class="student-info">
    <div><span>Student:</span> ${student.name}</div>
    <div><span>Training provider:</span> Avon Fire and Rescue Service</div>
    <div><span>Date skill sheet started:</span> 09/03/2026</div>
    <div><span>Location of course:</span> Avon</div>
  </div>

  <!-- Theory -->
  <div class="two-col-table">
    <table>
      <thead><tr><th colspan="2">Theory</th><th style="width:80px">Date</th></tr></thead>
      <tbody>${rows(theoryLeft)}</tbody>
    </table>
    <table>
      <thead><tr><th colspan="2">Theory</th><th style="width:80px">Date</th></tr></thead>
      <tbody>${rows(theoryRight)}</tbody>
    </table>
  </div>

  <!-- Practical -->
  <div class="two-col-table" style="margin-top:4px">
    <table>
      <thead><tr><th colspan="2">Practical</th><th style="width:80px">Date</th></tr></thead>
      <tbody>${rows(practLeft)}</tbody>
    </table>
    <table>
      <thead><tr><th colspan="2">Practical</th><th style="width:80px">Date</th></tr></thead>
      <tbody>${rows(practRight)}</tbody>
    </table>
  </div>

  <p class="note">Students must date all elements above, with the exception of 'if used by agency' only if their organisation doesn't use those techniques. No other elements should be taught on the course without the express prior written permission of Rescue 3.</p>

  <!-- Assessment -->
  <table class="assessment-table" style="margin-top:6px">
    <thead>
      <tr>
        <th>Assessment criteria: <small style="font-weight:normal;font-size:8pt">The student's marks must be at 3 or above to pass the below assessments, based on the Rescue 3 assessment criteria document.</small></th>
        <th>Date</th>
        <th>Pass</th>
        <th>Fail</th>
      </tr>
    </thead>
    <tbody>${assessRows()}</tbody>
  </table>

  <div class="result-row">
    <strong>Result:</strong>
    <span class="checkbox checked"></span> Pass &nbsp;&nbsp;
    <span class="checkbox"></span> Fail
  </div>

  <div style="font-size:9pt;margin:4px 0 2px;"><strong>Remarks:</strong></div>
  <div class="remarks-box"></div>

  <p class="legal-text">The undersigned agree that the student has received training and assessment in accordance with the Rescue 3 course standards, learning outcomes and assessment criteria. By signing, the student consents to providing their name and contact details to the training provider and Rescue 3 for the purposes of administering their course attendance and accreditation.<br><br>
  By signing below, you are agreeing that you took part in the above activities on the day written in the date column.</p>

  <div class="sig-grid">
    <div class="sig-block">
      <div class="sig-label">Student signature</div>
      <div></div>
      <div class="sig-label">Print name</div>
      <div></div>
      <div class="sig-label">Date</div>
      <div></div>
    </div>
    <div class="sig-block">
      <div class="sig-label">Instructor signature</div>
      <div></div>
      <div class="sig-label">Print name</div>
      <div></div>
      <div class="sig-label">Date</div>
      <div></div>
    </div>
  </div>
</div>`;
}

document.body.insertAdjacentHTML('beforeend', STUDENTS.map(buildPage).join(''));
</script>
</body>
</html>
