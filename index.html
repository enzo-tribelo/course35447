<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFRBO Skill Sheets — Avon Fire and Rescue Service</title>
<style>
  /* ── Reset ────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 9pt;
    color: #000;
    background: #e0e0e0;
  }

  /* ── Page ─────────────────────────────────── */
  .page {
    width: 210mm;
    height: 297mm;
    background: #fff;
    margin: 12px auto;
    padding: 8mm 10mm 6mm;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  @media print {
    body { background: #fff; }
    .no-print { display: none !important; }
    .page {
      margin: 0;
      padding: 8mm 10mm 6mm;
      width: 210mm;
      height: 297mm;
      page-break-after: always;
      page-break-inside: avoid;
    }
  }

  /* ── Header ───────────────────────────────── */
  .hdr {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1.5pt solid #000;
    padding-bottom: 4px;
    margin-bottom: 4px;
  }
  .hdr-logo { width: 140px; }
  .hdr-logo svg { width: 140px; height: auto; }
  .hdr-contact {
    font-size: 7pt;
    text-align: right;
    line-height: 1.5;
    color: #000;
  }
  .hdr-contact a { color: #000; text-decoration: none; }

  /* ── Course title ─────────────────────────── */
  .course-title {
    text-align: center;
    font-size: 11pt;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.3pt;
    margin: 3px 0;
    border-bottom: 0.5pt solid #000;
    padding-bottom: 3px;
  }

  /* ── Student info grid ────────────────────── */
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 0.5pt solid #000;
    margin: 3px 0;
    font-size: 8.5pt;
  }
  .info-cell {
    padding: 2px 5px;
    border-right: 0.5pt solid #000;
    border-bottom: 0.5pt solid #000;
  }
  .info-cell:nth-child(even) { border-right: none; }
  .info-cell:nth-last-child(-n+2) { border-bottom: none; }
  .info-label { font-weight: bold; }

  /* ── Tables ───────────────────────────────── */
  .table-pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    border: 0.5pt solid #000;
    margin: 3px 0 0;
  }
  .table-pair table { width: 100%; border-collapse: collapse; }
  .table-pair table:first-child { border-right: 0.5pt solid #000; }

  table th {
    background: #1c3461;
    color: #fff;
    font-size: 8pt;
    font-weight: bold;
    padding: 3px 5px;
    text-align: left;
  }
  table td {
    font-size: 8pt;
    padding: 1.5px 4px;
    border-bottom: 0.3pt solid #ccc;
    vertical-align: middle;
  }
  table tr:nth-child(even) td { background: #f0f4fa; }
  table tr:last-child td { border-bottom: none; }

  .col-date { width: 72px; color: #1c3461; font-weight: bold; font-size: 8pt; }
  .col-num  { width: 18px; color: #666; font-size: 7.5pt; }

  /* Assessment table */
  .assess-wrap {
    border: 0.5pt solid #000;
    margin: 3px 0 0;
  }
  .assess-hdr {
    background: #1c3461;
    color: #fff;
    font-size: 8pt;
    font-weight: bold;
    padding: 3px 5px;
    line-height: 1.3;
  }
  .assess-hdr span { font-weight: normal; font-size: 7.5pt; }
  .assess-table { width: 100%; border-collapse: collapse; }
  .assess-table td { font-size: 8pt; padding: 2px 5px; border-bottom: 0.3pt solid #ccc; }
  .assess-table tr:nth-child(even) td { background: #f0f4fa; }
  .assess-table tr:last-child td { border-bottom: none; }
  .assess-table .col-date { width: 72px; }
  .assess-table .col-check { width: 44px; text-align: center; }
  .assess-table .col-head { background: #d0d8ea; font-weight: bold; font-size: 8pt; padding: 2px 5px; }

  /* ── Checkbox ─────────────────────────────── */
  .cb {
    display: inline-block;
    width: 10px; height: 10px;
    border: 1pt solid #000;
    vertical-align: middle;
    margin-right: 2px;
  }
  .cb.checked { background: #1c3461; }

  /* ── Result row ───────────────────────────── */
  .result-row {
    font-size: 8.5pt;
    margin: 3px 0 2px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .result-row strong { font-size: 8.5pt; }

  /* ── Remarks ──────────────────────────────── */
  .remarks-label { font-size: 8pt; font-weight: bold; margin: 2px 0 1px; }
  .remarks-box {
    border: 0.5pt solid #000;
    min-height: 22px;
    padding: 2px 4px;
    margin-bottom: 3px;
    font-size: 8pt;
  }

  /* ── Legal text ───────────────────────────── */
  .legal {
    font-size: 7pt;
    color: #333;
    line-height: 1.35;
    margin: 2px 0 4px;
  }

  /* ── Signatures ───────────────────────────── */
  .sig-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 3px;
  }
  .sig-block { font-size: 8pt; }
  .sig-row { display: flex; flex-direction: column; margin-bottom: 3px; }
  .sig-row-label { font-weight: bold; font-size: 7.5pt; color: #444; margin-bottom: 1px; }
  .sig-row-line { border-bottom: 0.75pt solid #000; min-height: 14px; }

  /* ── Doc ref ──────────────────────────────── */
  .doc-ref { font-size: 6.5pt; color: #777; text-align: center; margin-bottom: 2px; }

  /* ── Note ─────────────────────────────────── */
  .note { font-size: 7pt; color: #444; font-style: italic; margin: 2px 0; line-height: 1.3; }

  /* ── Print button ─────────────────────────── */
  .no-print {
    text-align: center;
    padding: 10px;
    background: #333;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .no-print button {
    padding: 7px 20px;
    font-size: 10pt;
    background: #1c3461;
    color: #fff;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-family: Arial, sans-serif;
  }
  .no-print button:hover { background: #2a4a85; }
</style>
</head>
<body>

<div class="no-print">
  <button onclick="window.print()">🖨️ Print All 4 Sheets (A4)</button>
</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────
const STUDENTS = [
  { name: "Joshua Arberry", ref: "SFRBO v23.1 · 101-00044600266231-20260313" },
  { name: "Ben Crawford",   ref: "SFRBO v23.1 · 101-00044600266232-20260313" },
  { name: "Ben Newman",     ref: "SFRBO v23.1 · 101-00044600266234-20260313" },
  { name: "Paul Johnson",   ref: "SFRBO v23.1 · 101-00044600266237-20260313" },
];

const THEORY = [
  [1,  "Rescue 3 philosophy"],
  [2,  "Water rescue training standards"],
  [3,  "Personal equipment"],
  [4,  "Dynamic risk assessment and incident size-up"],
  [5,  "Pre-planning"],
  [6,  "Medical and decontamination considerations"],
  [7,  "Navigation and route planning"],
  [8,  "Communications"],
  [9,  "Crew operational roles"],
  [10, "Multiple boat operations"],
  [11, "Floodwater dynamics and hazards"],
  [12, "Boat, hull and drive types"],
  [13, "Rescue boat equipment"],
  [14, "Pre- and post-trip checks"],
  [15, "Vehicles in water"],
  [16, "Working with helicopters"],
  [17, "Boat wraps"],
  [18, "Hydraulic and weir considerations"],
];

const PRACTICAL = [
  [19, "Launching and recovery"],
  [20, "Boat handling under power"],
  [21, "Boat handling with paddles"],
  [22, "Towing"],
  [23, "Anchoring/securing"],
  [24, "Wading with boats"],
  [25, "Tethered boats"],
  [26, "Night/poor visibility operations"],
  [27, "Search operations"],
  [28, "Flips and rights"],
  [29, "Team/personal recovery"],
  [30, "Casualty pick-up and recovery"],
  [31, "Casualty management"],
  [32, "Boat-based conditional rescues"],
  [33, "Transporting loads"],
  [34, "Boat-based stretcher management"],
  [35, "Rescues from elevated positions"],
  [36, "Boat-based tethered rescues"],
];

const ASSESSMENTS = [
  "Foundation knowledge",
  "Boat handling under power",
  "Boat handling with paddles",
  "Team/personal recovery",
  "Casualty pick-up and recovery",
  "Flips and rights",
];

function itemDate(n) {
  if (n <= 18) return "09/03/2026";
  if (n <= 27) return "10/03/2026";
  return "11/03/2026";
}

// ── Logo SVG (from rescue3europe.com, white on dark bg → recoloured dark on white) ──
const LOGO_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 315 100">
  <rect width="315" height="100" rx="4" fill="#1c3461"/>
  <g fill="#fff">
    <text x="12" y="38" font-family="Arial,sans-serif" font-size="22" font-weight="bold" letter-spacing="1">RESCUE</text>
    <text x="158" y="38" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#f04130">3</text>
    <text x="12" y="60" font-family="Arial,sans-serif" font-size="11" letter-spacing="2">E U R O P E</text>
    <line x1="12" y1="66" x2="303" y2="66" stroke="#fff" stroke-width="1" opacity="0.4"/>
    <text x="12" y="82" font-family="Arial,sans-serif" font-size="7.5">www.rescue3europe.com</text>
    <text x="12" y="93" font-family="Arial,sans-serif" font-size="7.5">+44 (0) 1978 869069  ·  info@rescue3europe.com</text>
  </g>
</svg>`;

// ── Build one page ─────────────────────────────────────────────────────
function buildPage(s) {
  const tLeft  = THEORY.slice(0, 9);
  const tRight = THEORY.slice(9);
  const pLeft  = PRACTICAL.slice(0, 9);
  const pRight = PRACTICAL.slice(9);

  function tRows(items) {
    return items.map(([n, label]) =>
      `<tr><td class="col-num">${n}.</td><td>${label}</td><td class="col-date">${itemDate(n)}</td></tr>`
    ).join('');
  }

  function aRows() {
    return ASSESSMENTS.map(a =>
      `<tr>
        <td>${a}</td>
        <td class="col-date">11/03/2026</td>
        <td class="col-check"><span class="cb checked"></span></td>
        <td class="col-check"><span class="cb"></span></td>
      </tr>`
    ).join('');
  }

  return `
<div class="page">

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-logo">${LOGO_SVG}</div>
    <div class="hdr-contact">
      www.rescue3europe.com<br>
      +44 (0) 1978 869069<br>
      info@rescue3europe.com
    </div>
  </div>

  <div class="doc-ref">${s.ref}</div>

  <div class="course-title">Swiftwater and Flood Rescue Boat Operator</div>

  <!-- Student info -->
  <div class="info-grid">
    <div class="info-cell"><span class="info-label">Student: </span>${s.name}</div>
    <div class="info-cell"><span class="info-label">Training provider: </span>Avon Fire and Rescue Service</div>
    <div class="info-cell"><span class="info-label">Date skill sheet started: </span>09/03/2026</div>
    <div class="info-cell"><span class="info-label">Location of course: </span>Avon</div>
  </div>

  <!-- Theory -->
  <div class="table-pair">
    <table>
      <thead><tr><th colspan="2">Theory</th><th>Date</th></tr></thead>
      <tbody>${tRows(tLeft)}</tbody>
    </table>
    <table>
      <thead><tr><th colspan="2">Theory</th><th>Date</th></tr></thead>
      <tbody>${tRows(tRight)}</tbody>
    </table>
  </div>

  <!-- Practical -->
  <div class="table-pair" style="margin-top:2px">
    <table>
      <thead><tr><th colspan="2">Practical</th><th>Date</th></tr></thead>
      <tbody>${tRows(pLeft)}</tbody>
    </table>
    <table>
      <thead><tr><th colspan="2">Practical</th><th>Date</th></tr></thead>
      <tbody>${tRows(pRight)}</tbody>
    </table>
  </div>

  <p class="note">Students must date all elements above, with the exception of 'if used by agency' only if their organisation doesn't use those techniques. No other elements should be taught on the course without the express prior written permission of Rescue 3.</p>

  <!-- Assessment -->
  <div class="assess-wrap" style="margin-top:3px">
    <div class="assess-hdr">Assessment criteria: <span>The student's marks must be at 3 or above to pass the below assessments, based on the Rescue 3 assessment criteria document.</span></div>
    <table class="assess-table">
      <thead>
        <tr>
          <td class="col-head">Assessment</td>
          <td class="col-head col-date">Date</td>
          <td class="col-head col-check">Pass</td>
          <td class="col-head col-check">Fail</td>
        </tr>
      </thead>
      <tbody>${aRows()}</tbody>
    </table>
  </div>

  <div class="result-row">
    <strong>Result:</strong>
    <span><span class="cb checked"></span> Pass</span>
    <span><span class="cb"></span> Fail</span>
  </div>

  <div class="remarks-label">Remarks:</div>
  <div class="remarks-box"></div>

  <p class="legal">The undersigned agree that the student has received training and assessment in accordance with the Rescue 3 course standards, learning outcomes and assessment criteria. By signing, the student consents to providing their name and contact details to the training provider and Rescue 3 for the purposes of administering their course attendance and accreditation.<br>
  By signing below, you are agreeing that you took part in the above activities on the day written in the date column.</p>

  <!-- Signatures -->
  <div class="sig-grid">
    <div class="sig-block">
      <div class="sig-row"><div class="sig-row-label">Student signature</div><div class="sig-row-line"></div></div>
      <div class="sig-row"><div class="sig-row-label">Print name</div><div class="sig-row-line"></div></div>
      <div class="sig-row"><div class="sig-row-label">Date</div><div class="sig-row-line"></div></div>
    </div>
    <div class="sig-block">
      <div class="sig-row"><div class="sig-row-label">Instructor signature</div><div class="sig-row-line"></div></div>
      <div class="sig-row"><div class="sig-row-label">Print name</div><div class="sig-row-line"></div></div>
      <div class="sig-row"><div class="sig-row-label">Date</div><div class="sig-row-line"></div></div>
    </div>
  </div>

</div>`;
}

document.body.insertAdjacentHTML('beforeend', STUDENTS.map(buildPage).join(''));
</script>
</body>
</html>
